name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Lint with ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: check
      - name: Type check with mypy
        run: |
          pip install mypy
          mypy plugins/pre-vibe/scripts/ --ignore-missing-imports
      - name: Compile plugin scripts
        run: python3 -m py_compile plugins/pre-vibe/scripts/*.py
      - name: Run tests
        run: python3 -m unittest discover -s tests -v
